<!DOCTYPE html>
<html>
    <head>
      <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="shortcut icon" type="x-icon" href="2.png">
        <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
        <link rel="stylesheet" href="Form.css">
    </head>
<body>
  <h1 class="Logo-reg"></h1>
    <div class="whole-reg">
     <form action="">
          <h1>Registration</h1>
          <div class="input-box-reg">
           <input type="text" placeholder="First Name" required>
           <i class='bx bxs-user-check' ></i>
          </div>
          <div class="input-box-reg">
           <input type="text" placeholder="Middle Name" required>
           <i class='bx bxs-user-check' ></i>
          </div>
          <div class="input-box-reg">
            <input type="text" placeholder="Last Name" required>
            <i class='bx bxs-user-check' ></i>
           </div>
           <div class="Age-reg">
            <input type="date" placeholder="Birthdate" required>            
           </div>

           <div class="Reg-pass-reg">
            <input type="password" placeholder="Enter Password" required>           
           </div>
           <div class="Reg-pass-reg">
            <input type="password" placeholder="Confirm Password" required>
           </div>
           <div class="Reg-pass-reg">
            <input type="text" placeholder="Enter E-mail Address" required>
           </div>

           <div class="label-reg">
            <p>Sex:</p>
           </div>
           <div class="terms-reg">   
            <p><input type="checkbox" required> I accept the terms and conditions</p>
          </div>   
          <div class="Select-Gender-reg">
            <label><input type="radio" name="Gender" required>Male</label>
          </div>
          <div class="Select-Gender-reg">
            <label><input type="radio" name="Gender" required>Female</label>
          </div>
          <div class="Select-Gender-reg">
            <label><input type="radio" name="Gender" required>Others</label>
          </div>
          <button type="submit" class="btn-reg">Register</button>

          <div class="register-link-reg">
            <p><a href="Login&Reg.html">Back to Login</a></p>
          </div>
     </form>
</body>
</html>
